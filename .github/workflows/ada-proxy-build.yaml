name: "Ada Proxy: Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'cluster/apps/house/ada-proxy/**'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/ada-proxy

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get token
        id: get-app-token
        uses: getsentry/action-github-app-token@d4b5da6c5e37703f8c3b3e43abb5705b46e159cc # v3
        with:
          app_id: ${{ secrets.HOME_OPS_APP_ID }}
          private_key: ${{ secrets.HOME_OPS_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e44e994e3fd3386f6e0e517f5d84938c2e # v4
        with:
          token: ${{ steps.get-app-token.outputs.token }}

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8d7e219ad34b # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cluster/apps/house/ada-proxy
          file: cluster/apps/house/ada-proxy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
