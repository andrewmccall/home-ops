---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: openclaw-operator-system
spec:
  interval: 10m
  chart:
    spec:
      chart: openclaw-operator
      # renovate: datasource=helm registryUrl=oci://ghcr.io/openclaw-rocks/charts chart=openclaw-operator
      version: 0.26.2
      sourceRef:
        kind: HelmRepository
        name: openclaw
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
