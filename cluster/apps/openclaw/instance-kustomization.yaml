---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw-instance
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./cluster/apps/openclaw/instance
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: openclaw-operator
      namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
