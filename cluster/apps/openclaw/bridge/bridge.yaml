apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-bridge
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-bridge
    spec:
      containers:
        - name: app
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/bridge.mjs
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: OPENCLAW_BASE_URL
              value: "http://home-ops-openclaw.openclaw.svc:18789/v1"
            - name: OPENCLAW_MESSAGE_CHANNEL
              value: "home_assistant_voice"
            - name: BRIDGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-bridge-secrets
                  key: bridge-api-key
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-bridge-secrets
                  key: openclaw-gateway-token
            - name: SHARED_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-bridge-secrets
                  key: shared-session-key
            - name: BRIDGE_FORCE_DEGRADED_MODE
              valueFrom:
                secretKeyRef:
                  name: openclaw-bridge-secrets
                  key: force-degraded-mode
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: runtime
              mountPath: /app/bridge.mjs
              subPath: bridge.mjs
      volumes:
        - name: runtime
          configMap:
            name: bridge-runtime-configmap
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-bridge
  namespace: openclaw
spec:
  selector:
    app.kubernetes.io/name: openclaw-bridge
  ports:
    - name: http
      port: 4000
      targetPort: http
