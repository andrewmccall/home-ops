---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: home-ops-openclaw-allow-internal-nginx
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: home-ops-openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: networking
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
              app.kubernetes.io/instance: internal-nginx
      ports:
        - port: 18790
          protocol: TCP
        - port: 18794
          protocol: TCP