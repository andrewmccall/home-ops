---
apiVersion: v1
kind: Secret
metadata:
  name: social-api-keys
  namespace: openclaw
stringData:
  XURL_CONSUMER_KEY: "REPLACE_WITH_X_CONSUMER_KEY"
  XURL_CONSUMER_SECRET: "REPLACE_WITH_X_CONSUMER_SECRET"
  XURL_ACCESS_TOKEN: "REPLACE_WITH_X_ACCESS_TOKEN"
  XURL_TOKEN_SECRET: "REPLACE_WITH_X_TOKEN_SECRET"
  REDDIT_CLIENT_ID: "REPLACE_WITH_REDDIT_CLIENT_ID"
  REDDIT_CLIENT_SECRET: "REPLACE_WITH_REDDIT_CLIENT_SECRET"
  REDDIT_USERNAME: "REPLACE_WITH_REDDIT_USERNAME"
  REDDIT_PASSWORD: "REPLACE_WITH_REDDIT_PASSWORD"
