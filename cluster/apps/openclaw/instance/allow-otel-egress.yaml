---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: home-ops-openclaw-allow-otel-egress
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: home-ops-openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318