# Home Assistant voice assistant setup notes
# Direct integration with OpenClaw gateway (full Ada with memory, tools, context)
# Phase 1: Shared Ada Voice Contract

# Current Home Assistant limitation:
# - The built-in openai_conversation integration does not support YAML setup on this host.
# - Configure it through the UI/config-entry flow instead of configuration.yaml.
#
# Values to enter in the OpenAI Conversation config entry:
# - Base URL: http://home-ops-openclaw.openclaw.svc:18789/v1
# - API key: the shared OpenClaw gateway token stored in /config/secrets.yaml as ha_voice_gateway_token
# - Model: openclaw:main
# - Assistant name: Ada

# Then in Settings > Voice Assistants:
# 1. Create a new assistant called "Ada"
# 2. Set Conversation agent to the OpenAI Conversation config entry you created for Ada
# 3. Set STT to "Whisper" (wyoming at whisper-wyoming.house:10300)
# 4. Set TTS to "Piper" with voice en_GB-cori-high (wyoming at piper-wyoming.house:10200)
# 5. Assign to Satellite 1 device (Phase 2)
#
# When you speak to a voice assistant:
#   Your voice -> Whisper (STT) -> OpenClaw gateway (full Ada session) -> Piper (TTS) -> speaker
#
# This gives you FULL Ada:
# - Memory (MEMORY.md, daily notes)
# - Tools (web search, GitHub, file access)
# - Context from Telegram conversations (same Andrew/Ada session)
# - Voice-first responses: brief, friendly, conversational
#
# Transport: direct in-cluster service URL (not ingress), shared OpenClaw gateway token
# Token: stored in /config/secrets.yaml as ha_voice_gateway_token
# Current limitations:
# - OpenClaw's OpenAI-compatible endpoint accepts the shared gateway token only.
# - HA conversation integration wiring must be completed through the UI/config-entry flow.
