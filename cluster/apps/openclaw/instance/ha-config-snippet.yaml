# Home Assistant voice assistant setup notes
# Bridge-backed OpenAI Conversation path for the shared Ada session
# Phase 01.1: HA OpenClaw Shared Session Bridge

# Current Home Assistant limitation:
# - The built-in openai_conversation integration does not support YAML setup on this host.
# - Configure it through the UI/config-entry flow instead of configuration.yaml.
#
# Supported Home Assistant setup (Settings -> Devices & Services):
# 1. Add the **OpenAI** integration
# 2. Enter only the dedicated bridge-facing API key from Kubernetes Secret `openclaw-bridge-secrets`, key `bridge-api-key`
# 3. Open the integration's **Conversation** subentry or options
# 4. If the Model selector is hidden, disable **Recommended settings**
# 5. Set Model to `openclaw:main`
# 6. Keep the assistant name as Ada in the Conversation subentry / Voice Assistant binding
#
# Why there is no Base URL field in this Home Assistant version:
# - The integration always calls the official `https://api.openai.com` endpoint
# - Home Assistant resolves api.openai.com through the internal hostAlias in `home-assistant.yaml`
# - The mounted `openai-internal-ca` trust bundle accepts the spoof TLS cert
# - The bridge ingress owns that spoof path and forwards to the bridge Service
#
# Then in Settings -> Voice Assistants:
# 1. Create or edit the assistant named "Ada"
# 2. Set Conversation agent to the OpenAI Conversation / OpenAI subentry configured above
# 3. Set STT to "Whisper" (wyoming at whisper-wyoming.house:10300)
# 4. Set TTS to "Piper" with voice en_GB-cori-high (wyoming at piper-wyoming.house:10200)
# 5. Save and bind to the desired Assist-compatible device
#
# When you speak to Ada:
#   Your voice -> Whisper (STT) -> bridge-backed api.openai.com spoof path -> OpenClaw -> Piper (TTS) -> speaker
#
# This preserves the shared Ada surface:
# - Memory and tools from the main OpenClaw assistant
# - Telegram continuity through the fixed Andrew/Ada shared session
# - Brief, conversational voice replies
# - Explicit degraded-mode signaling if shared continuity is unavailable
#
# Do not create a custom Home Assistant integration or YAML conversation entry for this cutover.
