---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: home-ops-openclaw-allow-house-voice
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: home-ops-openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: house
      ports:
        - port: 18790
          protocol: TCP
