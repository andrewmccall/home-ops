---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: home-ops-openclaw
  namespace: openclaw
spec:
  gateway:
    controlUiOrigins:
      - "https://internal.andrewmccall.com"
      - "https://openclaw-gateway.andrewmccall.com"
  config:
    mergeMode: merge
    raw:
      plugins:
        allow:
          - diagnostics-otel
        entries:
          diagnostics-otel:
            enabled: true
          telegram:
            enabled: true
      agents:
        defaults:
          model:
            primary: "openrouter/google/gemini-3-flash-preview"
          systemPromptOverride: |
            You are Ada, a friendly and warm home assistant.

            When replying to voice interactions:
            - Keep replies short and conversational — one or two sentences by default.
            - Expand only when the user explicitly asks for more detail or a longer answer.
            - Use natural spoken language, not markdown or formatted text.

            Home safety rules — follow these strictly:
            - You must NEVER attempt to perform destructive, administrative, or configuration-level Home Assistant actions. This includes deleting automations, editing configuration files, managing add-ons, resetting devices, modifying integrations, or any system-level changes.
            - If a user asks for any of these actions, respond warmly but clearly: "I can't do that — that kind of home admin change isn't something I handle. You'll want to do that directly in Home Assistant."
            - You CAN discuss home topics, answer questions about how things work, and acknowledge requests you can't fulfill yet. Don't refuse to engage — just decline to act.
            - Approved home actions (announcements, notifications, running pre-approved scenes or scripts) will be added in a future update. Until then, explain that those aren't available yet rather than going silent.

            Maintain your consistent Ada identity across all channels — the same warmth, memory, and personality whether the user reaches you by voice, Telegram, or any other path.
      channels:
        telegram:
          enabled: true
          botToken: "${TELEGRAM_BOT_TOKEN}"
          dmPolicy: "pairing"
          groupPolicy: "allowlist"
          streaming:
            mode: "partial"
      session:
        scope: per-sender
      gateway:
        http:
          endpoints:
            chatCompletions:
              enabled: true
            responses:
              enabled: true
      diagnostics:
        enabled: true
        otel:
          enabled: true
          endpoint: "http://otel-collector.monitoring.svc:4318"
          protocol: "http/protobuf"
          traces: true
          metrics: true
          logs: true
          serviceName: "openclaw-gateway"
          sampleRate: 1.0
          flushIntervalMs: 5000
      tools:
        media:
          audio:
            models:
              - provider: openai
                model: whisper-1
                baseUrl: "http://whisper-stt.openclaw.svc:9000/v1"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
    - secretRef:
        name: social-api-keys
  env:
    - name: NODE_PATH
      value: "/home/openclaw/.openclaw/runtime/node_modules"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://otel-collector.monitoring.svc:4318"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "http/protobuf"
    - name: OTEL_SERVICE_NAME
      value: "openclaw-gateway"
  initContainers:
    - name: init-otel-modules
      image: ghcr.io/openclaw/openclaw:latest
      command:
        - sh
        - -lc
        - |
          set -eu
          mkdir -p /home/openclaw/.openclaw/runtime
          cd /home/openclaw/.openclaw/runtime
          if [ ! -f package.json ]; then
            npm init -y >/dev/null 2>&1
          fi
          npm install --no-audit --no-fund --omit=dev \
            @opentelemetry/api \
            @opentelemetry/api-logs \
            @opentelemetry/exporter-logs-otlp-proto \
            @opentelemetry/exporter-metrics-otlp-proto \
            @opentelemetry/exporter-trace-otlp-proto \
            @opentelemetry/resources \
            @opentelemetry/sdk-logs \
            @opentelemetry/sdk-metrics \
            @opentelemetry/sdk-node \
            @opentelemetry/sdk-trace-base \
            @opentelemetry/semantic-conventions
      env:
        - name: HOME
          value: /tmp
        - name: NPM_CONFIG_CACHE
          value: /tmp/.npm
      volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
  chromium:
    enabled: true
    image:
      repository: chromedp/headless-shell
      tag: stable
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  observability:
    metrics:
      enabled: false
  storage:
    persistence:
      enabled: true
      size: 20Gi
