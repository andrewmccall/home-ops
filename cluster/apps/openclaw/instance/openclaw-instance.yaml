---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: home-ops-openclaw
  namespace: openclaw
spec:
  gateway:
    controlUiOrigins:
      - "https://internal.andrewmccall.com"
      - "https://openclaw-gateway.andrewmccall.com"
  config:
    mergeMode: overwrite
    raw:
      gateway:
        mode: local
        http:
          endpoints:
            chatCompletions:
              enabled: true
      channels:
        telegram:
          botToken: "env:TELEGRAM_BOT_TOKEN"
          groupPolicy: open
      plugins:
        allow:
          - diagnostics-otel
          - telegram
        entries:
          diagnostics-otel:
            enabled: true
          telegram:
            enabled: true
      agents:
        defaults:
          model:
            primary: "openrouter/google/gemini-3-flash-preview"
          memorySearch:
            enabled: false
      session:
        scope: per-sender
      diagnostics:
        enabled: true
        otel:
          enabled: true
          endpoint: "http://otel-collector.monitoring.svc:4318"
          protocol: "http/protobuf"
          traces: true
          metrics: true
          logs: true
          serviceName: "openclaw-gateway"
          sampleRate: 1.0
          flushIntervalMs: 5000
      tools:
        media:
          audio:
            models:
              - provider: openai
                model: whisper-1
                baseUrl: "http://whisper-stt.openclaw.svc:9000/v1"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
    - secretRef:
        name: social-api-keys
  env:
    - name: NODE_PATH
      value: "/home/openclaw/.openclaw/runtime/node_modules"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://otel-collector.monitoring.svc:4318"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "http/protobuf"
    - name: OTEL_SERVICE_NAME
      value: "openclaw-gateway"
  initContainers:
    - name: init-otel-modules
      image: ghcr.io/openclaw/openclaw:latest
      command:
        - sh
        - -lc
        - |
          set -eu
          mkdir -p /home/openclaw/.openclaw/runtime
          cd /home/openclaw/.openclaw/runtime
          if [ ! -f package.json ]; then
            npm init -y >/dev/null 2>&1
          fi
          npm install --no-audit --no-fund --omit=dev \
            @opentelemetry/api \
            @opentelemetry/api-logs \
            @opentelemetry/exporter-logs-otlp-proto \
            @opentelemetry/exporter-metrics-otlp-proto \
            @opentelemetry/exporter-trace-otlp-proto \
            @opentelemetry/resources \
            @opentelemetry/sdk-logs \
            @opentelemetry/sdk-metrics \
            @opentelemetry/sdk-node \
            @opentelemetry/sdk-trace-base \
            @opentelemetry/semantic-conventions
      env:
        - name: HOME
          value: /tmp
        - name: NPM_CONFIG_CACHE
          value: /tmp/.npm
      volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
  chromium:
    enabled: true
    image:
      repository: chromedp/headless-shell
      tag: stable
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  observability:
    metrics:
      enabled: false
  storage:
    persistence:
      enabled: true
      size: 20Gi
