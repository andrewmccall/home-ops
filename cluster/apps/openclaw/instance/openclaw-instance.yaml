---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: home-ops-openclaw
  namespace: openclaw
spec:
  gateway:
    controlUiOrigins:
      - "https://internal.andrewmccall.com"
      - "https://openclaw-gateway.andrewmccall.com"
  config:
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            primary: "openrouter/hunter-alpha"
      session:
        scope: per-sender
      gateway:
        http:
          endpoints:
            chatCompletions:
              enabled: true
      messages:
        stt:
          enabled: true
          maxBytes: 20971520
          models:
            - provider: "openai"
              model: "whisper-1"
              baseUrl: "http://whisper-stt.openclaw.svc.cluster.local:9000/v1"
              apiKey: "unused"
          timeoutSeconds: 120
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  chromium:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  storage:
    persistence:
      enabled: true
      size: 20Gi
