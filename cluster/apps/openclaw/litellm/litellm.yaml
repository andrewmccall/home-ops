---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: openclaw
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4o
        litellm_params:
          model: openai/openclaw:main
          api_base: http://home-ops-openclaw.openclaw.svc.${CLUSTER_DOMAIN}:18789/v1
          api_key: ${GATEWAY_TOKEN}

    general_settings:
      master_key: ${LITELLM_KEY}

    litellm_settings:
      drop_params: true
      request_timeout: 120
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: openclaw
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: main-latest
              pullPolicy: Always
            env:
              GATEWAY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secrets
                    key: gateway-token
              LITELLM_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secrets
                    key: litellm-key
            args:
              - "--config"
              - "/config/config.yaml"
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000
    ingress:
      app:
        className: internal
        hosts:
          - host: litellm.${DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /config
