---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openai-proxy-nginx-conf
  namespace: openclaw
data:
  default.conf: |
    server {
        listen 443 ssl;
        server_name api.openai.com;

        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        location / {
            proxy_pass http://litellm:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-proxy
  namespace: openclaw
  labels:
    app: openai-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openai-proxy
  template:
    metadata:
      labels:
        app: openai-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 443
              name: https
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: openai-proxy-nginx-conf
        - name: tls
          secret:
            secretName: openai-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: openai-proxy
  namespace: openclaw
spec:
  selector:
    app: openai-proxy
  ports:
    - name: https
      port: 443
      targetPort: 443
  type: ClusterIP
  clusterIP: 10.43.100.100
