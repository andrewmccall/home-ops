---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wyoming-openwakeword
  namespace: house
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      # renovate: datasource=helm registryUrl=https://bjw-s-labs.github.io/helm-charts chart=app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      wyoming-openwakeword:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rhasspy/wyoming-openwakeword
              tag: 2.1.0@sha256:52cb1168731a1849fc28cf339c935fde58746bbabc94226668a40ef6ddf5d42b
            args:
              - --uri
              - tcp://0.0.0.0:10400
              - --custom-model-dir
              - /models
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: 10400
              readiness:
                enabled: true
                spec:
                  tcpSocket:
                    port: 10400
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: 10400
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: wyoming-openwakeword
        ports:
          wyoming:
            port: 10400
    persistence:
      models:
        type: configMap
        name: wakeword-models
        globalMounts:
          - path: /models
