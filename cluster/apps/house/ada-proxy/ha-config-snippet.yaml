# Home Assistant configuration.yaml additions
# Add these to enable Ada as your voice assistant conversation agent

# OpenAI conversation integration pointing at ada-proxy
openai_conversation:
  - api_base: http://ada-proxy.house.svc.cluster.local:8000/v1
    api_key: "unused"  # Auth handled by the proxy
    model: openrouter/hunter-alpha
    name: Ada

# Then in Settings > Voice Assistants:
# 1. Create a new assistant called "Ada"
# 2. Set Conversation agent to "Ada" (the OpenAI integration above)
# 3. Set STT to "Whisper"
# 4. Set TTS to "Piper" (en_GB-alan-medium)
# 5. Assign to your Satellite 1 device
